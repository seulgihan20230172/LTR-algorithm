# severity 실험 공통 설정 (L2R·control group 배치 스크립트와 동일하게 사용)
# 프로젝트 루트에서 실행하는 것을 기준으로 경로를 둔다.

evaluation:
  # train_thresholds: train에서 추정한 score 경계로 test 분할
  # test_oracle_ratio: test 집합의 실제 4클래스 개수로 상위 점수부터 배정
  test_mode: test_oracle_ratio
  # true: report_metrics에 Ordinal MAE·RMSE·Within-1 출력 (0~3 등간격 relevance 가정의 보조 지표)
  ordinal_severity_metrics: false

features:
  # false: object / pandas category 열을 피처에서 제외 (숫자형만 사용)
  include_categorical_columns: true

data:
  csv: severity/logging_monitoring_anomalies.csv

split:
  test_size: 0.2
  val_size: 0.2
  random_state: 42

ranking:
  # global: LTR에서 query 하나(아래 global_qid), 각 CSV 행 = document — 심각도로 이상 건(행) 전체를 한 목록에서 정렬
  # anomaly_id: (레거시) Anomaly_ID를 qid로 사용 — 보통 문서 1개/쿼리라 랭킹 지표·학습이 거의 의미 없음
  qid_mode: global
  global_qid: 0
  # 인위적 group_size 분할은 사용하지 않음; 호환용으로만 남김
  group_size: 64

epochs:
  l2r: 35
  anomaly: 20
