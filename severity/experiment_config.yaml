# severity 실험 설정 (단일 파일 — L2R·control group 공통)
# 프로젝트 루트 기준 경로.
#
# CVE 실험 vs 로깅(레거시) 실험 전환: 아래 active_profile 만 바꾸면 됨 (logging | cve).
# 공통 값(split·epochs·features 일부)은 YAML 앵커(x-common)로 한 번만 정의됨.

active_profile: logging

# 프로필에 공통으로 합쳐지는 블록 (split / epochs / features)
x-common: &common
  split:
    # stratified_shuffle: Severity 또는 CVSS 분위 층화 후 무작위
    # time_ordered: 시각 순 — 앞 train / 가운데 val / 끝 test (CVE는 mod/pub max, 로깅은 Timestamp)
    mode: time_ordered
    test_size: 0.2
    val_size: 0.2
    random_state: 42
  epochs:
    l2r: 150
    anomaly: 150
  features:
    # false: object / category 열 제외 (숫자형만)
    include_categorical_columns: true

profiles:
  # 로깅 모니터링 이상 탐지 CSV — 범주형 Severity 라벨
  logging:
    <<: *common
    evaluation:
      # train_thresholds | test_oracle_ratio | train_score_relevance_0_3
      test_mode: train_thresholds
      ordinal_severity_metrics: false
    data:
      csv: severity/logging_monitoring_anomalies.csv
      # label_mode 생략 시 severity (experiment_config.py 기본값)
    ranking:
      # timestamp_hour_1h | global | anomaly_id | cve_calendar_day
      qid_mode: timestamp_hour_1h
      global_qid: 0
      group_size: 64

  # CVE 요약 + meaning 피처 — 라벨은 숫자 CVSS, qid는 달력일
  cve:
    <<: *common
    evaluation:
      test_mode: train_score_relevance_0_3
      ordinal_severity_metrics: false
    data:
      csv: severity/CVE_summary_separate/cve-datasets/cve_with_meaning70.csv
      label_mode: cvss
    ranking:
      qid_mode: cve_calendar_day
      global_qid: 0
      group_size: 64
