# severity 실험 공통 설정 (L2R·control group 배치 스크립트와 동일하게 사용)
# 프로젝트 루트에서 실행하는 것을 기준으로 경로를 둔다.

evaluation:
  # train_thresholds: train score 분포·클래스 개수로 경계(th) 추정 후 val/test에 동일 적용
  # test_oracle_ratio: test 집합의 실제 4클래스 개수로 상위 점수부터 배정(벤치용)
  # train_score_relevance_0_3: (train_severity_anomaly_rank 전용) train 점수 min~max를 [0,3]으로 선형 매핑 후
  #   반올림해 Low/Medium/High/Critical에 대응시켜 정답과 비교
  test_mode: train_score_relevance_0_3
  # true: report_metrics에 Ordinal MAE·RMSE·Within-1 출력 (0~3 등간격 relevance 가정의 보조 지표)
  ordinal_severity_metrics: false

features:
  # false: object / pandas category 열을 피처에서 제외 (숫자형만 사용)
  include_categorical_columns: true

data:
  csv: severity/logging_monitoring_anomalies.csv

split:
  # stratified_shuffle: Severity 층화 후 무작위 (클래스 비율 유지, 시계열에는 부적합할 수 있음)
  # time_ordered: Timestamp 오름차순 — 앞 구간 train, 가운데 val, 마지막 test (미래 예측·보안 시나리오에 가깝게)
  mode: time_ordered
  test_size: 0.2
  val_size: 0.2
  random_state: 42

ranking:
  # timestamp_hour_1h: Timestamp 1시간 단위 버킷, 시각 순으로 qid=0,1,2,… (같은 시간대 행이 한 query)
  # global: query 하나(global_qid), 전체 행을 한 목록에서 정렬
  # anomaly_id: (레거시) Anomaly_ID를 qid로 사용
  qid_mode: timestamp_hour_1h
  global_qid: 0
  # 인위적 group_size 분할은 사용하지 않음; 호환용으로만 남김
  group_size: 64

epochs:
  l2r: 150
  anomaly: 150
